<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Wallpaper</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(12, 15, 20, 0.64);
      --panel-strong: rgba(13, 17, 24, 0.78);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f7fbff;
      --muted: rgba(235, 244, 247, 0.72);
      --accent: #f49b5f;
      --cool: #52c7d5;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #080b0f;
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    .stage {
      position: fixed;
      inset: 0;
      isolation: isolate;
      background: #080b0f;
    }

    .video-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: -3;
      background: #080b0f;
      background-image: url("https://i.ytimg.com/vi/PQoLr7eVLUI/maxresdefault.jpg");
      background-position: center;
      background-size: cover;
    }

    .video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;
      min-width: 177.78vh;
      min-height: 100vh;
      transform: translate(-50%, -50%);
      border: 0;
      pointer-events: none;
      filter: saturate(1.05) contrast(1.04);
    }

    .ambient-fallback {
      position: absolute;
      inset: -4%;
      background:
        linear-gradient(110deg, rgba(20, 9, 42, .58), transparent 34%, rgba(245, 121, 57, .34) 58%, rgba(8, 13, 20, .46)),
        url("https://i.ytimg.com/vi/PQoLr7eVLUI/maxresdefault.jpg") center / cover no-repeat;
      transform: scale(1.04);
      animation: ambientDrift 18s ease-in-out infinite alternate;
    }

    .ambient-fallback::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(255, 255, 255, .05), transparent 38%),
        linear-gradient(270deg, transparent, rgba(244, 155, 95, .18), transparent);
      mix-blend-mode: screen;
      opacity: .75;
      animation: lightSweep 12s ease-in-out infinite alternate;
    }

    @keyframes ambientDrift {
      from {
        transform: scale(1.04) translate3d(-1.5%, 0, 0);
        filter: saturate(1.08) contrast(1.03);
      }

      to {
        transform: scale(1.1) translate3d(1.5%, -1%, 0);
        filter: saturate(1.22) contrast(1.08);
      }
    }

    @keyframes lightSweep {
      from {
        transform: translateX(-8%);
        opacity: .45;
      }

      to {
        transform: translateX(8%);
        opacity: .86;
      }
    }

    .wash {
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(5, 7, 10, 0.42), rgba(5, 7, 10, 0.16) 46%, rgba(5, 7, 10, 0.74)),
        radial-gradient(circle at 72% 28%, rgba(255, 165, 96, 0.2), transparent 28%),
        linear-gradient(180deg, rgba(4, 6, 9, 0.25), rgba(4, 6, 9, 0.72));
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255, 255, 255, .4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .4) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: linear-gradient(90deg, transparent, black 58%);
    }

    .rail {
      position: absolute;
      top: 24px;
      right: 24px;
      bottom: 24px;
      width: min(410px, calc(100vw - 48px));
      display: grid;
      grid-template-rows: auto auto minmax(220px, 1fr);
      gap: 12px;
      align-content: start;
    }

    .widget {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.18);
    }

    .widget::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255, 255, 255, .14), transparent 42%);
    }

    .clock {
      padding: 22px 22px 20px;
      min-height: 154px;
    }

    .eyebrow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--cool);
      box-shadow: 0 0 18px var(--cool);
    }

    .time {
      margin-top: 4px;
      font-size: clamp(48px, 7vh, 76px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .date {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      text-transform: capitalize;
    }

    .calendar {
      padding: 16px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: 650;
      text-transform: capitalize;
    }

    .calendar-actions {
      display: flex;
      gap: 6px;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 7px;
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      cursor: pointer;
    }

    .icon-button:hover {
      background: rgba(255, 255, 255, .15);
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-name,
    .day {
      min-width: 0;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .day-name {
      height: 20px;
      color: rgba(245, 250, 252, .6);
      font-size: 11px;
      text-transform: uppercase;
    }

    .day {
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .86);
    }

    .day.other {
      color: rgba(255, 255, 255, .28);
      background: rgba(255, 255, 255, .025);
    }

    .day.today {
      background: linear-gradient(135deg, var(--accent), #f15f72);
      color: white;
      font-weight: 700;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .22) inset, 0 8px 24px rgba(244, 122, 96, .28);
    }

    .weather {
      display: grid;
      min-height: 480px;
      min-width: 320px;
      grid-template-rows: auto 1fr;
      background: var(--panel-strong);
    }

    .weather-head {
      padding: 10px 12px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .weather-title {
      font-size: 15px;
      font-weight: 650;
      color: var(--text);
    }

    .weather-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .weather-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .weather-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .weather-temp {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      font-family: inherit;
    }

    .weather-status {
      display: flex;
      flex-direction: column;
    }

    .weather-desc {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-transform: capitalize;
    }

    .weather-date {
      font-size: 12px;
      color: var(--muted);
    }

    .weather-icon {
      font-size: 32px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
    }

    .weather-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }

    .w-detail {
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 4px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .wd-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .wd-val {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .thermal-map-container {
      flex-grow: 1;
      min-height: 220px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .thermal-map-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }

    .hide {
      display: none;
    }

    @media (max-width: 720px) {
      .rail {
        top: 12px;
        right: 12px;
        bottom: 12px;
        width: calc(100vw - 24px);
      }

      .clock {
        min-height: 132px;
        padding: 18px;
      }

      .time {
        font-size: 48px;
      }
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="video-wrap" aria-hidden="true">
      <div class="ambient-fallback"></div>
    </div>
    <div class="wash"></div>
    <div class="grain"></div>

    <section class="rail" aria-label="Widgets">
      <article class="widget clock">
        <div class="eyebrow">
          <span>Escritorio vivo</span>
          <span class="live-dot" aria-hidden="true"></span>
        </div>
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">Cargando fecha</div>
      </article>

      <article class="widget calendar">
        <div class="calendar-head">
          <div class="calendar-title" id="monthTitle">Mes</div>
          <div class="calendar-actions">
            <button class="icon-button" id="prevMonth" type="button" title="Mes anterior"
              aria-label="Mes anterior">‹</button>
            <button class="icon-button" id="todayMonth" type="button" title="Hoy" aria-label="Volver a hoy">•</button>
            <button class="icon-button" id="nextMonth" type="button" title="Mes siguiente"
              aria-label="Mes siguiente">›</button>
          </div>
        </div>
        <div class="month-grid" id="monthGrid" aria-label="Calendario mensual"></div>
      </article>

      <article class="widget weather">
        <div class="weather-head">
          <div class="weather-title">Clima en Barcelona</div>
          <span class="live-dot" style="background: var(--accent); box-shadow: 0 0 18px var(--accent);"></span>
        </div>
        <div class="weather-body">
          <div class="weather-info">
            <div class="weather-main">
              <span class="weather-temp" id="weatherTemp">--°C</span>
              <div class="weather-status">
                <span class="weather-desc" id="weatherDesc">Cargando...</span>
                <span class="weather-date" id="weatherDay">Hoy</span>
              </div>
            </div>
            <div class="weather-icon" id="weatherIcon">⛅</div>
          </div>
          <div class="weather-details">
            <div class="w-detail">
              <span class="wd-label">Humedad</span>
              <span class="wd-val" id="weatherHumidity">--%</span>
            </div>
            <div class="w-detail">
              <span class="wd-label">Viento</span>
              <span class="wd-val" id="weatherWind">-- km/h</span>
            </div>
            <div class="w-detail">
              <span class="wd-label">Sensación</span>
              <span class="wd-val" id="weatherApparent">--°C</span>
            </div>
          </div>
          <div class="thermal-map-container">
            <iframe 
              id="thermalMap"
              src="https://node.windy.com/embed2.html?lat=41.385&lon=2.173&zoom=8&level=surface&overlay=temp&menu=&message=&marker=&calendar=&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1" 
              title="Mapa Térmico de Barcelona"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const spanish = new Intl.DateTimeFormat("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    const monthFormatter = new Intl.DateTimeFormat("es-ES", {
      month: "long",
      year: "numeric"
    });

    const timeNode = document.querySelector("#time");
    const dateNode = document.querySelector("#date");
    const monthTitle = document.querySelector("#monthTitle");
    const monthGrid = document.querySelector("#monthGrid");
    const videoWrap = document.querySelector(".video-wrap");

    let viewedMonth = new Date();
    viewedMonth.setDate(1);

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function tick() {
      const now = new Date();
      timeNode.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      dateNode.textContent = spanish.format(now);
    }

    function sameDate(a, b) {
      return a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function renderCalendar() {
      const today = new Date();
      const year = viewedMonth.getFullYear();
      const month = viewedMonth.getMonth();
      const first = new Date(year, month, 1);
      const startOffset = (first.getDay() + 6) % 7;
      const gridStart = new Date(year, month, 1 - startOffset);
      const names = ["L", "M", "X", "J", "V", "S", "D"];

      monthTitle.textContent = monthFormatter.format(viewedMonth);
      monthGrid.replaceChildren();

      for (const name of names) {
        const node = document.createElement("div");
        node.className = "day-name";
        node.textContent = name;
        monthGrid.append(node);
      }

      for (let index = 0; index < 42; index += 1) {
        const date = new Date(gridStart);
        date.setDate(gridStart.getDate() + index);
        const node = document.createElement("div");
        node.className = "day";
        node.textContent = date.getDate();
        if (date.getMonth() !== month) node.classList.add("other");
        if (sameDate(date, today)) node.classList.add("today");
        monthGrid.append(node);
      }
    }

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return "";
      return /^[a-z]+:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
    }

    function mountVideoIfPossible() {
      if (location.protocol === "file:") return;

      const iframe = document.createElement("iframe");
      iframe.title = "Video de fondo";
      iframe.src = "https://www.youtube-nocookie.com/embed/PQoLr7eVLUI?autoplay=1&mute=1&loop=1&playlist=PQoLr7eVLUI&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1&disablekb=1&fs=0&iv_load_policy=3&origin=" + encodeURIComponent(location.origin);
      iframe.allow = "autoplay; encrypted-media; picture-in-picture";
      iframe.referrerPolicy = "origin";
      videoWrap.append(iframe);
    }

    document.querySelector("#prevMonth").addEventListener("click", () => {
      viewedMonth.setMonth(viewedMonth.getMonth() - 1);
      renderCalendar();
    });

    document.querySelector("#nextMonth").addEventListener("click", () => {
      viewedMonth.setMonth(viewedMonth.getMonth() + 1);
      renderCalendar();
    });

    document.querySelector("#todayMonth").addEventListener("click", () => {
      viewedMonth = new Date();
      viewedMonth.setDate(1);
      renderCalendar();
    });

    async function fetchWeather() {
      try {
        const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=41.3851&longitude=2.1734&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m&timezone=Europe/Madrid");
        if (!response.ok) throw new Error("API error");
        const data = await response.json();
        
        const current = data.current;
        const temp = Math.round(current.temperature_2m);
        const apparent = Math.round(current.apparent_temperature);
        const humidity = current.relative_humidity_2m;
        const wind = Math.round(current.wind_speed_10m);
        const code = current.weather_code;

        document.querySelector("#weatherTemp").textContent = `${temp}°C`;
        document.querySelector("#weatherApparent").textContent = `${apparent}°C`;
        document.querySelector("#weatherHumidity").textContent = `${humidity}%`;
        document.querySelector("#weatherWind").textContent = `${wind} km/h`;

        let desc = "Despejado";
        let icon = "☀️";
        
        const wmo = {
          0: { desc: "Despejado", icon: "☀️" },
          1: { desc: "Mayormente despejado", icon: "🌤️" },
          2: { desc: "Parcialmente nublado", icon: "⛅" },
          3: { desc: "Nublado", icon: "☁️" },
          45: { desc: "Niebla", icon: "🌫️" },
          48: { desc: "Niebla escarcha", icon: "🌫️" },
          51: { desc: "Llovizna ligera", icon: "🌧️" },
          53: { desc: "Llovizna moderada", icon: "🌧️" },
          55: { desc: "Llovizna densa", icon: "🌧️" },
          61: { desc: "Lluvia ligera", icon: "🌧️" },
          63: { desc: "Lluvia moderada", icon: "🌧️" },
          65: { desc: "Lluvia fuerte", icon: "🌧️" },
          71: { desc: "Nevada ligera", icon: "❄️" },
          73: { desc: "Nevada moderada", icon: "❄️" },
          75: { desc: "Nevada fuerte", icon: "❄️" },
          80: { desc: "Chubascos ligeros", icon: "🌦️" },
          81: { desc: "Chubascos moderados", icon: "🌦️" },
          82: { desc: "Chubascos violentos", icon: "🌦️" },
          95: { desc: "Tormenta", icon: "⛈️" },
          96: { desc: "Tormenta con granizo", icon: "⛈️" },
          99: { desc: "Tormenta fuerte", icon: "⛈️" }
        };

        if (wmo[code]) {
          desc = wmo[code].desc;
          icon = wmo[code].icon;
        }

        if (!current.is_day && code <= 1) {
          icon = "🌙";
        }

        document.querySelector("#weatherDesc").textContent = desc;
        document.querySelector("#weatherIcon").textContent = icon;
        
        const options = { weekday: 'long', day: 'numeric', month: 'short' };
        document.querySelector("#weatherDay").textContent = new Date().toLocaleDateString('es-ES', options);

      } catch (err) {
        console.error("Error fetching weather:", err);
        document.querySelector("#weatherDesc").textContent = "Error al cargar";
      }
    }

    fetchWeather();
    setInterval(fetchWeather, 15 * 60 * 1000);

    mountVideoIfPossible();
    tick();
    renderCalendar();
    setInterval(tick, 1000);
  </script>
</body>

</html>
